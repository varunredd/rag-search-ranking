<svg width="1600" height="1080" viewBox="0 0 1600 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1080" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.55" stop-color="#071A34"/>
      <stop offset="1" stop-color="#16123A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0C1A2B"/>
      <stop offset="1" stop-color="#0B1630"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="2000" height="1400" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font: 700 44px Inter, Arial, sans-serif; fill: #F3F6FF; }
      .subtitle { font: 500 22px Inter, Arial, sans-serif; fill: #B8C4E0; }
      .section { font: 600 18px Inter, Arial, sans-serif; fill: #95A4C6; letter-spacing: 4px; text-transform: uppercase; }
      .cardTitle { font: 700 20px Inter, Arial, sans-serif; fill: #F5F7FF; }
      .cardText { font: 500 16px Inter, Arial, sans-serif; fill: #B8C4E0; }
      .cardSmall { font: 600 15px Inter, Arial, sans-serif; fill: #DCE7FF; }
      .pill { font: 700 15px Inter, Arial, sans-serif; fill: white; }
      .mono { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #DCE7FF; }
    </style>
  </defs>

  <rect width="1600" height="1080" fill="url(#bg)"/>
  <circle cx="1350" cy="170" r="240" fill="#6A5CFF" opacity="0.10"/>
  <circle cx="220" cy="180" r="180" fill="#28B6F6" opacity="0.08"/>

  <text x="120" y="88" class="title">Two-Stage Passage Ranking Studio — Architecture</text>
  <text x="120" y="128" class="subtitle">Retrieval, reranking, experiments, and full-stack visualization in one repo</text>

  <text x="120" y="184" class="section">Offline experiment workflow</text>

  <g filter="url(#shadow)">
    <rect x="120" y="220" rx="24" ry="24" width="240" height="120" fill="url(#card)" stroke="#243451"/>
    <rect x="430" y="220" rx="24" ry="24" width="250" height="120" fill="#0F2B2D" stroke="#2A5E60"/>
    <rect x="750" y="220" rx="24" ry="24" width="300" height="120" fill="#231639" stroke="#6C41B8"/>
    <rect x="1120" y="220" rx="24" ry="24" width="320" height="120" fill="#10284A" stroke="#2F70D1"/>
  </g>

  <text x="170" y="270" class="cardTitle">Dataset / Data Prep</text>
  <text x="170" y="304" class="cardText">QQP train.csv</text>
  <text x="170" y="328" class="cardText">or synthetic fallback</text>

  <text x="480" y="270" class="cardTitle">Stage 1 Retrieval</text>
  <text x="480" y="304" class="cardText">BM25</text>
  <text x="480" y="328" class="cardText">TF-IDF</text>
  <text x="560" y="328" class="cardText">SBERT</text>

  <text x="800" y="270" class="cardTitle">Stage 2 Reranking</text>
  <text x="800" y="304" class="cardText">Standard CE</text>
  <text x="930" y="304" class="cardText">Modified CE</text>
  <text x="800" y="328" class="cardText">DistilBERT / BERT-base</text>

  <text x="1170" y="270" class="cardTitle">Outputs</text>
  <text x="1170" y="304" class="cardText">metrics.csv</text>
  <text x="1280" y="304" class="cardText">plots</text>
  <text x="1170" y="328" class="cardText">qualitative examples</text>

  <path d="M360 280 H430" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>
  <path d="M680 280 H750" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>
  <path d="M1050 280 H1120" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>

  <polygon points="420,270 440,280 420,290" fill="#6D86B0"/>
  <polygon points="740,270 760,280 740,290" fill="#6D86B0"/>
  <polygon points="1110,270 1130,280 1110,290" fill="#6D86B0"/>

  <text x="120" y="430" class="section">Interactive app workflow</text>

  <g filter="url(#shadow)">
    <rect x="120" y="470" rx="24" ry="24" width="260" height="130" fill="#25153D" stroke="#7A49C6"/>
    <rect x="460" y="470" rx="24" ry="24" width="300" height="130" fill="#0F2B2D" stroke="#2A5E60"/>
    <rect x="840" y="470" rx="24" ry="24" width="300" height="130" fill="#10284A" stroke="#2F70D1"/>
    <rect x="1220" y="470" rx="24" ry="24" width="250" height="130" fill="#3A2410" stroke="#C67815"/>
  </g>

  <text x="185" y="520" class="cardTitle">React Dashboard</text>
  <text x="185" y="554" class="cardText">Overview</text>
  <text x="275" y="554" class="cardText">Live Demo</text>
  <text x="185" y="578" class="cardText">Experiments</text>
  <text x="295" y="578" class="cardText">Analysis</text>

  <text x="525" y="520" class="cardTitle">FastAPI Backend</text>
  <text x="525" y="554" class="cardText">/api/config</text>
  <text x="640" y="554" class="cardText">/api/results/*</text>
  <text x="525" y="578" class="cardText">/api/demo/search</text>

  <text x="905" y="520" class="cardTitle">ml_core</text>
  <text x="905" y="554" class="cardText">retrieval/</text>
  <text x="1020" y="554" class="cardText">reranker/</text>
  <text x="905" y="578" class="cardText">evaluation/</text>

  <text x="1270" y="520" class="cardTitle">Rendered Results</text>
  <text x="1270" y="554" class="cardText">ranked candidates</text>
  <text x="1270" y="578" class="cardText">charts + examples</text>

  <path d="M380 535 H460" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>
  <path d="M760 535 H840" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>
  <path d="M1140 535 H1220" stroke="#6D86B0" stroke-width="4" stroke-linecap="round"/>

  <polygon points="450,525 470,535 450,545" fill="#6D86B0"/>
  <polygon points="830,525 850,535 830,545" fill="#6D86B0"/>
  <polygon points="1210,525 1230,535 1210,545" fill="#6D86B0"/>

  <text x="120" y="690" class="section">Repo layout</text>

  <g filter="url(#shadow)">
    <rect x="120" y="730" rx="26" ry="26" width="1320" height="250" fill="#0C1728" stroke="#253654"/>
  </g>

  <text x="160" y="785" class="mono">repo/</text>
  <text x="160" y="820" class="mono">├── frontend/</text>
  <text x="160" y="850" class="mono">│   └── React + Vite dashboard</text>
  <text x="160" y="890" class="mono">├── backend/</text>
  <text x="160" y="920" class="mono">│   └── FastAPI wrapper around ml_core</text>
  <text x="700" y="785" class="mono">├── ml_core/</text>
  <text x="700" y="820" class="mono">│   ├── config.py</text>
  <text x="700" y="850" class="mono">│   ├── data_prep.py</text>
  <text x="700" y="880" class="mono">│   ├── retrieval/retrievers.py</text>
  <text x="700" y="910" class="mono">│   ├── reranker/models.py + trainer.py</text>
  <text x="700" y="940" class="mono">│   ├── evaluation/metrics.py</text>
  <text x="700" y="970" class="mono">│   └── models/ + results/</text>

  <rect x="1230" y="770" rx="18" ry="18" width="170" height="44" fill="#1B2C4A" stroke="#37598D"/>
  <text x="1263" y="798" class="pill">source of truth</text>
  <rect x="1230" y="830" rx="18" ry="18" width="170" height="44" fill="#173027" stroke="#2E6D58"/>
  <text x="1265" y="858" class="pill">checkpoint-backed</text>
  <rect x="1230" y="890" rx="18" ry="18" width="170" height="44" fill="#352312" stroke="#A96A1A"/>
  <text x="1268" y="918" class="pill">experiment-driven</text>
</svg>
